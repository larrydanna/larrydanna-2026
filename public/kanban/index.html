<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kanban</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:          #0F0D0A;
      --surface:     #1B1915;
      --surface-2:   #252118;
      --text:        #F2EDE2;
      --muted:       #9E9485;
      --accent:      #D4863A;
      --border:      #2E2A24;
      --border-b:    #3A3530;
      --success:     #6DB884;
      --danger:      #C84B31;
      --toolbar-bg:  #221A10;
      --tab-bar:     #1A1208;
      --tab-active:  #C89040;
      --tab-inactive:#2E2418;
      --tab-border:  #3A2E1C;
      --btn-bg:      #3A2E1C;
      --btn-hover:   #4A3C28;
      --btn-border:  #5A4C38;
      --font:        'IBM Plex Sans', system-ui, sans-serif;
    }

    html, body {
      height: 100%;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      font-size: 14px;
    }

    body {
      display: flex;
      flex-direction: column;
    }

    /* ── Toolbar ────────────────────────────────────────────── */
    #toolbar {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 7px 12px;
      background: var(--toolbar-bg);
      border-bottom: 1px solid var(--tab-border);
      user-select: none;
    }

    .toolbar-title {
      font: 600 13px/1 var(--font);
      color: var(--text);
      margin-right: 4px;
    }

    .tdiv {
      width: 1px;
      height: 18px;
      background: var(--btn-border);
      margin: 0 4px;
      flex-shrink: 0;
    }

    .toolbar-spacer { flex: 1; }

    .toolbar-hint {
      font-size: 12px;
      color: var(--muted);
      min-width: 70px;
      text-align: right;
    }

    .tbtn {
      background: var(--btn-bg);
      border: 1px solid var(--btn-border);
      border-radius: 4px;
      color: var(--text);
      font: 500 12px/1 var(--font);
      padding: 5px 10px;
      cursor: pointer;
      white-space: nowrap;
    }
    .tbtn:hover { background: var(--btn-hover); }

    .tbtn.primary {
      background: var(--accent);
      border-color: var(--accent);
      color: #0F0D0A;
      font-weight: 600;
    }
    .tbtn.primary:hover {
      background: color-mix(in srgb, var(--accent) 85%, #fff 15%);
    }

    /* ── Tab bar ────────────────────────────────────────────── */
    #tabbar {
      flex-shrink: 0;
      display: flex;
      align-items: flex-end;
      gap: 3px;
      padding: 6px 12px 0;
      background: var(--tab-bar);
      border-bottom: 1px solid var(--tab-border);
      overflow-x: auto;
      scrollbar-width: none;
    }
    #tabbar::-webkit-scrollbar { display: none; }

    .tab {
      display: flex;
      align-items: center;
      gap: 7px;
      padding: 6px 10px;
      background: var(--tab-inactive);
      border: 1px solid var(--tab-border);
      border-bottom: none;
      border-radius: 4px 4px 0 0;
      cursor: pointer;
      white-space: nowrap;
      min-width: 80px;
      max-width: 160px;
      font-size: 12px;
    }

    .tab.active {
      background: var(--surface);
      border-bottom: 1px solid var(--surface);
      margin-bottom: -1px;
    }

    .tab.drag-over { border-color: var(--tab-active); }

    .tab-name {
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      outline: none;
      min-width: 0;
    }

    .tab-name[contenteditable="true"] {
      background: var(--surface-2);
      border-radius: 2px;
      padding: 1px 4px;
      overflow: visible;
    }

    .tab-x {
      flex-shrink: 0;
      color: var(--muted);
      font-size: 15px;
      line-height: 1;
      padding: 1px 2px;
      border-radius: 2px;
    }
    .tab-x:hover {
      color: var(--danger);
      background: color-mix(in srgb, var(--danger) 15%, transparent);
    }

    .tab-add {
      background: transparent;
      border: 1px solid transparent;
      border-bottom: none;
      border-radius: 4px 4px 0 0;
      color: var(--muted);
      font-size: 17px;
      line-height: 1;
      padding: 5px 9px;
      cursor: pointer;
    }
    .tab-add:hover {
      color: var(--text);
      background: var(--tab-inactive);
      border-color: var(--tab-border);
    }

    /* ── Board area ─────────────────────────────────────────── */
    #board-area {
      flex: 1;
      min-height: 0;
      display: flex;
      align-items: flex-start;
      gap: 16px;
      padding: 20px 24px;
      overflow-x: auto;
      overflow-y: hidden;
      background: var(--bg);
    }

    /* ── Column ─────────────────────────────────────────────── */
    .column {
      display: flex;
      flex-direction: column;
      width: 280px;
      flex-shrink: 0;
      max-height: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
    }

    /* Per-column accent stripe */
    .column:nth-child(1) { border-top: 2px solid var(--accent); }
    .column:nth-child(2) { border-top: 2px solid var(--border-b); }
    .column:nth-child(3) { border-top: 2px solid var(--success); }

    .col-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 11px 14px 10px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .col-name {
      font: 600 12px/1 var(--font);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--muted);
      outline: none;
      cursor: text;
      border-radius: 3px;
      padding: 2px 4px;
      margin: -2px -4px;
    }
    .column:nth-child(1) .col-name { color: var(--accent); }
    .column:nth-child(3) .col-name { color: var(--success); }

    .col-name[contenteditable="true"] {
      background: var(--surface-2);
      color: var(--text);
    }

    .col-count {
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 4px;
      font: 500 11px/1 var(--font);
      padding: 2px 6px;
      color: var(--muted);
    }

    /* ── Cards container ────────────────────────────────────── */
    .col-cards {
      flex: 1;
      overflow-y: auto;
      padding: 10px 10px 6px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      min-height: 64px;
    }

    .col-cards::-webkit-scrollbar { width: 5px; }
    .col-cards::-webkit-scrollbar-track { background: transparent; }
    .col-cards::-webkit-scrollbar-thumb { background: var(--border-b); border-radius: 3px; }

    .col-empty {
      text-align: center;
      color: var(--muted);
      font-size: 12px;
      padding: 10px 0 4px;
      pointer-events: none;
      font-style: italic;
    }

    /* ── Card ───────────────────────────────────────────────── */
    .card {
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 30px 10px 12px;
      cursor: grab;
      position: relative;
      user-select: none;
      flex-shrink: 0;
    }
    .card:active { cursor: grabbing; }
    .card:hover { border-color: var(--border-b); }

    .card-text {
      font-size: 13px;
      line-height: 1.5;
      color: var(--text);
      outline: none;
      word-break: break-word;
      white-space: pre-wrap;
      min-height: 18px;
    }
    .card-text[contenteditable="true"] {
      cursor: text;
      user-select: text;
    }
    .card-text:empty::before {
      content: 'Type here…';
      color: var(--muted);
      pointer-events: none;
    }

    .card-del {
      position: absolute;
      top: 7px;
      right: 7px;
      display: none;
      align-items: center;
      justify-content: center;
      width: 18px;
      height: 18px;
      background: transparent;
      border: none;
      border-radius: 3px;
      color: var(--muted);
      font-size: 15px;
      line-height: 1;
      cursor: pointer;
      padding: 0;
    }
    .card:hover .card-del { display: flex; }
    .card-del:hover {
      color: var(--danger);
      background: color-mix(in srgb, var(--danger) 15%, transparent);
    }

    /* ── Drop indicator ─────────────────────────────────────── */
    .drop-indicator {
      height: 2px;
      background: var(--accent);
      border-radius: 1px;
      margin: 0 2px;
      flex-shrink: 0;
      pointer-events: none;
    }

    /* ── Add card button ────────────────────────────────────── */
    .col-add-btn {
      display: block;
      width: 100%;
      padding: 9px 14px;
      background: transparent;
      border: none;
      border-top: 1px solid var(--border);
      border-radius: 0 0 8px 8px;
      color: var(--muted);
      font: 400 13px/1 var(--font);
      text-align: left;
      cursor: pointer;
      flex-shrink: 0;
    }
    .col-add-btn:hover { color: var(--text); background: var(--surface-2); }

    /* ── Help overlay ───────────────────────────────────────── */
    #help {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.6);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }
    #help.hidden { display: none; }

    .help-box {
      background: var(--surface);
      border: 1px solid var(--border-b);
      border-radius: 8px;
      padding: 28px 32px;
      max-width: 400px;
      width: 90%;
    }

    .help-box h2 {
      font: 600 13px/1 var(--font);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--accent);
      margin-bottom: 18px;
    }

    .kb-list {
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 9px 16px;
      margin-bottom: 20px;
    }

    .kb-list kbd {
      font: 500 12px/1 var(--font);
      background: var(--surface-2);
      border: 1px solid var(--border-b);
      border-radius: 3px;
      padding: 3px 7px;
      color: var(--text);
      white-space: nowrap;
      align-self: center;
    }

    .kb-list span {
      font-size: 13px;
      color: var(--muted);
      align-self: center;
    }

    .help-dismiss {
      font-size: 12px;
      color: var(--muted);
      text-align: center;
    }
  </style>
</head>
<body>

<div id="toolbar">
  <span class="toolbar-title">Kanban</span>
  <div class="tdiv"></div>
  <button class="tbtn primary" id="btn-new-card">+ New Card</button>
  <div class="toolbar-spacer"></div>
  <span class="toolbar-hint" id="toolbar-hint">Auto-saved.</span>
  <div class="tdiv"></div>
  <button class="tbtn" id="btn-export">Export JSON</button>
  <button class="tbtn" id="btn-import">Import JSON</button>
  <input type="file" id="import-file" accept=".json" style="display:none">
  <div class="tdiv"></div>
  <button class="tbtn" id="btn-help">? Help</button>
</div>

<div id="tabbar">
  <button class="tab-add" id="btn-add-board" title="New board (Ctrl+T)">+</button>
</div>

<div id="board-area"></div>

<div id="help" class="hidden">
  <div class="help-box">
    <h2>Keyboard Shortcuts</h2>
    <div class="kb-list">
      <kbd>N</kbd>              <span>New card in first column</span>
      <kbd>Ctrl + T</kbd>       <span>New board</span>
      <kbd>Ctrl + E</kbd>       <span>Export as JSON</span>
      <kbd>Ctrl + I</kbd>       <span>Import JSON file</span>
      <kbd>?</kbd>              <span>Toggle this help</span>
      <kbd>Esc</kbd>            <span>Close help / stop editing</span>
      <kbd>Enter</kbd>          <span>Save card text (in edit mode)</span>
      <kbd>Shift + Enter</kbd>  <span>New line in card text</span>
    </div>
    <p class="help-dismiss">Press Esc or click outside to close.</p>
  </div>
</div>

<script>
'use strict';

const STORE_KEY = 'kanban-v1';

let state = { boards: [], activeBoard: null };
let dragSrcColId  = null;
let dragSrcCardId = null;

/* ── Utilities ──────────────────────────────────────────────── */

function uid() {
  return Date.now().toString(36) + Math.random().toString(36).slice(2, 6);
}

let hintTimer = null;
function flashHint(msg) {
  const el = document.getElementById('toolbar-hint');
  el.textContent = msg;
  clearTimeout(hintTimer);
  hintTimer = setTimeout(() => { el.textContent = 'Auto-saved.'; }, 1800);
}

/* ── Persistence ────────────────────────────────────────────── */

function save(hint) {
  localStorage.setItem(STORE_KEY, JSON.stringify(state));
  if (hint) flashHint(hint);
}

function load() {
  try {
    const raw = localStorage.getItem(STORE_KEY);
    if (!raw) return initDefaults();
    const data = JSON.parse(raw);
    if (!data.boards || !Array.isArray(data.boards) || data.boards.length === 0) return initDefaults();
    state = data;
    if (!state.boards.find(b => b.id === state.activeBoard)) {
      state.activeBoard = state.boards[0].id;
    }
  } catch {
    initDefaults();
  }
}

function initDefaults() {
  const boardId = uid();
  state = {
    boards: [{
      id: boardId,
      name: 'Board 1',
      columns: [
        { id: uid(), name: 'To Do', cards: [
          { id: uid(), text: 'Add more cards here' },
          { id: uid(), text: 'Drag cards between columns' },
        ]},
        { id: uid(), name: 'WIP', cards: [
          { id: uid(), text: 'Getting things done' },
        ]},
        { id: uid(), name: 'Done', cards: [
          { id: uid(), text: 'Had a great idea ✓' },
        ]},
      ]
    }],
    activeBoard: boardId
  };
}

function getActiveBoard() {
  return state.boards.find(b => b.id === state.activeBoard) || null;
}

/* ── Board management ───────────────────────────────────────── */

function addBoard() {
  const n = state.boards.length + 1;
  const boardId = uid();
  state.boards.push({
    id: boardId,
    name: `Board ${n}`,
    columns: [
      { id: uid(), name: 'To Do', cards: [] },
      { id: uid(), name: 'WIP',   cards: [] },
      { id: uid(), name: 'Done',  cards: [] },
    ]
  });
  state.activeBoard = boardId;
  save('Board added.');
  render();
}

function removeBoard(id) {
  if (state.boards.length === 1) {
    // Last board: clear its cards instead of deleting
    state.boards[0].columns.forEach(col => { col.cards = []; });
    save('Board cleared.');
    renderBoard();
    return;
  }
  const idx = state.boards.findIndex(b => b.id === id);
  if (idx === -1) return;
  state.boards.splice(idx, 1);
  if (state.activeBoard === id) {
    state.activeBoard = state.boards[Math.min(idx, state.boards.length - 1)].id;
  }
  save('Board removed.');
  render();
}

function switchBoard(id) {
  if (state.activeBoard === id) return;
  state.activeBoard = id;
  save();
  render();
}

function reorderBoard(srcId, tgtId) {
  const si = state.boards.findIndex(b => b.id === srcId);
  const ti = state.boards.findIndex(b => b.id === tgtId);
  if (si === -1 || ti === -1) return;
  const [board] = state.boards.splice(si, 1);
  state.boards.splice(ti, 0, board);
  save();
  renderTabs();
}

/* ── Card management ────────────────────────────────────────── */

function addCard(colId) {
  const board = getActiveBoard();
  if (!board) return;
  const col = board.columns.find(c => c.id === colId);
  if (!col) return;
  const card = { id: uid(), text: '' };
  col.cards.push(card);
  save();
  renderBoard();
  // Focus the new card
  setTimeout(() => {
    const cardEls = document.querySelectorAll(`.col-cards[data-col-id="${colId}"] .card`);
    const lastEl  = cardEls[cardEls.length - 1];
    if (lastEl) lastEl.querySelector('.card-text')?.click();
    // Scroll the column to show the new card
    const colCards = document.querySelector(`.col-cards[data-col-id="${colId}"]`);
    if (colCards) colCards.scrollTop = colCards.scrollHeight;
  }, 0);
}

function deleteCard(colId, cardId) {
  const board = getActiveBoard();
  if (!board) return;
  const col = board.columns.find(c => c.id === colId);
  if (!col) return;
  col.cards = col.cards.filter(c => c.id !== cardId);
  save();
  renderBoard();
}

function moveCard(srcColId, srcCardId, tgtColId, insertBeforeCardId) {
  const board = getActiveBoard();
  if (!board) return;
  const srcCol = board.columns.find(c => c.id === srcColId);
  const tgtCol = board.columns.find(c => c.id === tgtColId);
  if (!srcCol || !tgtCol) return;
  const ci = srcCol.cards.findIndex(c => c.id === srcCardId);
  if (ci === -1) return;
  const [card] = srcCol.cards.splice(ci, 1);
  if (insertBeforeCardId == null) {
    tgtCol.cards.push(card);
  } else {
    const ii = tgtCol.cards.findIndex(c => c.id === insertBeforeCardId);
    tgtCol.cards.splice(ii === -1 ? tgtCol.cards.length : ii, 0, card);
  }
  save();
  renderBoard();
}

/* ── Export / Import ────────────────────────────────────────── */

function exportJSON() {
  const blob = new Blob([JSON.stringify(state, null, 2)], { type: 'application/json' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href     = url;
  a.download = 'kanban.json';
  a.click();
  URL.revokeObjectURL(url);
  flashHint('Exported!');
}

function importJSON() {
  document.getElementById('import-file').click();
}

/* ── Drag helpers ───────────────────────────────────────────── */

function getDragAfterElement(container, y) {
  const cards = [...container.querySelectorAll('.card')].filter(el => {
    return parseFloat(el.style.opacity) !== 0.4;
  });
  return cards.reduce((closest, child) => {
    const box    = child.getBoundingClientRect();
    const offset = y - box.top - box.height / 2;
    if (offset < 0 && offset > closest.offset) return { offset, element: child };
    return closest;
  }, { offset: Number.NEGATIVE_INFINITY }).element;
}

function removeAllDropIndicators() {
  document.querySelectorAll('.drop-indicator').forEach(el => el.remove());
}

/* ── Render ─────────────────────────────────────────────────── */

function render() {
  renderTabs();
  renderBoard();
}

function renderTabs() {
  const tabbar = document.getElementById('tabbar');
  const addBtn = document.getElementById('btn-add-board');
  tabbar.querySelectorAll('.tab').forEach(el => el.remove());

  state.boards.forEach(board => {
    const tab = document.createElement('div');
    tab.className = 'tab' + (board.id === state.activeBoard ? ' active' : '');
    tab.dataset.id = board.id;
    tab.draggable  = true;

    const nameSpan  = document.createElement('span');
    nameSpan.className       = 'tab-name';
    nameSpan.textContent     = board.name;
    nameSpan.contentEditable = 'false';

    const closeSpan = document.createElement('span');
    closeSpan.className   = 'tab-x';
    closeSpan.textContent = '×';
    closeSpan.title       = 'Close board';

    tab.appendChild(nameSpan);
    tab.appendChild(closeSpan);

    /* click to switch */
    tab.addEventListener('click', e => {
      if (e.target === closeSpan) return;
      if (nameSpan.contentEditable === 'true') return;
      switchBoard(board.id);
    });

    /* double-click to rename */
    nameSpan.addEventListener('dblclick', () => {
      nameSpan.contentEditable = 'true';
      nameSpan.focus();
      const range = document.createRange();
      range.selectNodeContents(nameSpan);
      const sel = window.getSelection();
      sel.removeAllRanges();
      sel.addRange(range);
    });

    nameSpan.addEventListener('blur', () => {
      nameSpan.contentEditable = 'false';
      const newName = nameSpan.textContent.trim();
      board.name = newName || board.name;
      nameSpan.textContent = board.name;
      save();
    });

    nameSpan.addEventListener('keydown', e => {
      if (e.key === 'Enter')  { e.preventDefault(); nameSpan.blur(); }
      if (e.key === 'Escape') { nameSpan.textContent = board.name; nameSpan.blur(); }
    });

    /* close */
    closeSpan.addEventListener('click', e => {
      e.stopPropagation();
      removeBoard(board.id);
    });

    /* drag to reorder tabs */
    tab.addEventListener('dragstart', e => {
      e.dataTransfer.setData('tabId', board.id);
      setTimeout(() => { tab.style.opacity = '0.5'; }, 0);
    });
    tab.addEventListener('dragend',  () => { tab.style.opacity = '1'; });
    tab.addEventListener('dragover', e => {
      e.preventDefault();
      // Only highlight for tab drags, not card drags
      if (!dragSrcCardId) tab.classList.add('drag-over');
    });
    tab.addEventListener('dragleave', () => tab.classList.remove('drag-over'));
    tab.addEventListener('drop', e => {
      e.preventDefault();
      tab.classList.remove('drag-over');
      const srcId = e.dataTransfer.getData('tabId');
      if (srcId && srcId !== board.id) reorderBoard(srcId, board.id);
    });

    tabbar.insertBefore(tab, addBtn);
  });
}

function renderBoard() {
  const area  = document.getElementById('board-area');
  area.innerHTML = '';
  const board = getActiveBoard();
  if (!board) return;
  board.columns.forEach(col => area.appendChild(buildColumnEl(col)));
}

function buildColumnEl(col) {
  const colEl = document.createElement('div');
  colEl.className    = 'column';
  colEl.dataset.colId = col.id;

  /* header */
  const header  = document.createElement('div');
  header.className = 'col-header';

  const nameEl  = document.createElement('span');
  nameEl.className       = 'col-name';
  nameEl.textContent     = col.name;
  nameEl.contentEditable = 'false';
  nameEl.title           = 'Click to rename column';

  const countEl = document.createElement('span');
  countEl.className   = 'col-count';
  countEl.textContent = col.cards.length;

  header.appendChild(nameEl);
  header.appendChild(countEl);

  /* column rename */
  nameEl.addEventListener('click', () => {
    nameEl.contentEditable = 'true';
    nameEl.focus();
    const range = document.createRange();
    range.selectNodeContents(nameEl);
    const sel = window.getSelection();
    sel.removeAllRanges();
    sel.addRange(range);
  });
  nameEl.addEventListener('blur', () => {
    nameEl.contentEditable = 'false';
    const newName = nameEl.textContent.trim();
    col.name = newName || col.name;
    nameEl.textContent = col.name;
    save();
  });
  nameEl.addEventListener('keydown', e => {
    if (e.key === 'Enter')  { e.preventDefault(); nameEl.blur(); }
    if (e.key === 'Escape') { nameEl.textContent = col.name; nameEl.blur(); }
  });

  /* cards container */
  const cardsEl = document.createElement('div');
  cardsEl.className      = 'col-cards';
  cardsEl.dataset.colId  = col.id;

  if (col.cards.length === 0) {
    const emptyEl = document.createElement('div');
    emptyEl.className   = 'col-empty';
    emptyEl.textContent = 'Drop a card here, or click + below';
    cardsEl.appendChild(emptyEl);
  } else {
    col.cards.forEach(card => cardsEl.appendChild(buildCardEl(card, col)));
  }

  /* drop zone events */
  cardsEl.addEventListener('dragover', e => {
    e.preventDefault();
    e.dataTransfer.dropEffect = 'move';
    if (!dragSrcCardId) return;
    removeAllDropIndicators();
    const afterEl = getDragAfterElement(cardsEl, e.clientY);
    const ind = document.createElement('div');
    ind.className = 'drop-indicator';
    if (afterEl == null) cardsEl.appendChild(ind);
    else cardsEl.insertBefore(ind, afterEl);
  });

  cardsEl.addEventListener('dragleave', e => {
    if (!cardsEl.contains(e.relatedTarget)) removeAllDropIndicators();
  });

  cardsEl.addEventListener('drop', e => {
    e.preventDefault();
    removeAllDropIndicators();
    if (!dragSrcCardId) return;
    const afterEl       = getDragAfterElement(cardsEl, e.clientY);
    const insertBeforeId = afterEl ? afterEl.dataset.cardId : null;
    moveCard(dragSrcColId, dragSrcCardId, col.id, insertBeforeId);
  });

  /* add card button */
  const addBtn = document.createElement('button');
  addBtn.className   = 'col-add-btn';
  addBtn.textContent = '+ Add card';
  addBtn.addEventListener('click', () => addCard(col.id));

  colEl.appendChild(header);
  colEl.appendChild(cardsEl);
  colEl.appendChild(addBtn);
  return colEl;
}

function buildCardEl(card, col) {
  const cardEl = document.createElement('div');
  cardEl.className       = 'card';
  cardEl.draggable       = true;
  cardEl.dataset.cardId  = card.id;
  cardEl.dataset.colId   = col.id;

  const textEl = document.createElement('div');
  textEl.className       = 'card-text';
  textEl.textContent     = card.text;
  textEl.contentEditable = 'false';

  const delBtn = document.createElement('button');
  delBtn.className   = 'card-del';
  delBtn.textContent = '×';
  delBtn.title       = 'Delete card';

  cardEl.appendChild(textEl);
  cardEl.appendChild(delBtn);

  /* click text to edit */
  textEl.addEventListener('click', () => {
    cardEl.draggable       = false;
    textEl.contentEditable = 'true';
    textEl.focus();
    // Move cursor to end
    const range = document.createRange();
    range.selectNodeContents(textEl);
    range.collapse(false);
    const sel = window.getSelection();
    sel.removeAllRanges();
    sel.addRange(range);
  });

  textEl.addEventListener('blur', () => {
    textEl.contentEditable = 'false';
    cardEl.draggable       = true;
    const newText = textEl.textContent.trim();
    // If brand-new and still empty, remove it
    if (newText === '' && card.text === '') {
      deleteCard(col.id, card.id);
      return;
    }
    card.text          = newText || card.text;
    textEl.textContent = card.text;
    save();
  });

  textEl.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); textEl.blur(); }
    if (e.key === 'Escape') { textEl.textContent = card.text; textEl.blur(); }
  });

  /* delete */
  delBtn.addEventListener('click', e => {
    e.stopPropagation();
    deleteCard(col.id, card.id);
  });

  /* drag */
  cardEl.addEventListener('dragstart', e => {
    if (textEl.contentEditable === 'true') { e.preventDefault(); return; }
    dragSrcColId  = col.id;
    dragSrcCardId = card.id;
    e.dataTransfer.effectAllowed = 'move';
    e.dataTransfer.setData('cardId', card.id);
    setTimeout(() => { cardEl.style.opacity = '0.4'; }, 0);
  });

  cardEl.addEventListener('dragend', () => {
    cardEl.style.opacity = '1';
    dragSrcColId  = null;
    dragSrcCardId = null;
    removeAllDropIndicators();
  });

  return cardEl;
}

/* ── Help ───────────────────────────────────────────────────── */

function toggleHelp() { document.getElementById('help').classList.toggle('hidden'); }
function hideHelp()   { document.getElementById('help').classList.add('hidden'); }

document.getElementById('help').addEventListener('click', e => {
  if (e.target === document.getElementById('help')) hideHelp();
});

/* ── Keyboard shortcuts ─────────────────────────────────────── */

document.addEventListener('keydown', e => {
  const active = document.activeElement;
  const typing = active?.tagName === 'TEXTAREA' ||
                 active?.tagName === 'INPUT'    ||
                 active?.contentEditable === 'true';

  if (e.key === 'Escape') {
    hideHelp();
    if (active && active !== document.body) active.blur();
    return;
  }

  if (!typing && e.key === '?') { toggleHelp(); return; }

  const k = e.key.toLowerCase();

  if (e.ctrlKey || e.metaKey) {
    if (k === 'e') { e.preventDefault(); exportJSON(); return; }
    if (k === 'i') { e.preventDefault(); importJSON(); return; }
    if (k === 't') { e.preventDefault(); addBoard();   return; }
  }

  if (!typing && k === 'n') {
    const board = getActiveBoard();
    if (board) addCard(board.columns[0].id);
  }
});

/* ── Init ───────────────────────────────────────────────────── */

document.addEventListener('DOMContentLoaded', () => {
  load();
  render();

  document.getElementById('btn-add-board').addEventListener('click', addBoard);
  document.getElementById('btn-new-card').addEventListener('click', () => {
    const board = getActiveBoard();
    if (board) addCard(board.columns[0].id);
  });
  document.getElementById('btn-export').addEventListener('click', exportJSON);
  document.getElementById('btn-import').addEventListener('click', importJSON);
  document.getElementById('btn-help').addEventListener('click', toggleHelp);

  document.getElementById('import-file').addEventListener('change', e => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = evt => {
      try {
        const data = JSON.parse(evt.target.result);
        if (!data.boards || !Array.isArray(data.boards) || data.boards.length === 0) {
          throw new Error('Invalid kanban file — expected { boards: [...] }');
        }
        state = data;
        if (!state.boards.find(b => b.id === state.activeBoard)) {
          state.activeBoard = state.boards[0].id;
        }
        save();
        render();
        flashHint('Imported!');
      } catch (err) {
        alert('Import failed: ' + err.message);
      }
    };
    reader.readAsText(file);
    e.target.value = '';
  });
});
</script>
